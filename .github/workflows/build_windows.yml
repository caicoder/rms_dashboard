name: Build Windows App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Resolve Shengwang SDK Windows Symlink Issue
        run: |
          # Locate the DownloadSDK.cmake file inside the Pub Cache dynamically
          $filePath = Get-ChildItem -Path "$env:LOCALAPPDATA\Pub\Cache\hosted\pub.dev" -Filter "DownloadSDK.cmake" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $filePath) {
              $filePath = Get-ChildItem -Path "$env:PUB_CACHE\hosted\pub.dev" -Filter "DownloadSDK.cmake" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          if ($filePath) {
              Write-Output "Patching DownloadSDK.cmake at: $filePath"
              $content = Get-Content $filePath
              
              # Prepend realpath component translation so CMake resolves symlink paths to actual directories during extraction
              $patch = 'get_filename_component(CMAKE_CURRENT_SOURCE_DIR "${CMAKE_CURRENT_SOURCE_DIR}" REALPATH)'
              Set-Content $filePath -Value ($patch, $content)
              Write-Output "Successfully patched DownloadSDK.cmake!"
          } else {
              Write-Error "Could not find DownloadSDK.cmake to patch inside Pub cache."
              exit 1
          }
        shell: powershell

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Build Installer using Inno Setup
        run: iscc windows/installer.iss

      - name: Upload ZIP Release (Folder)
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: build/windows/x64/runner/Release/

      - name: Upload EXE Setup (Single File Installer)
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-exe
          path: build/windows/installer/骅羲监控_setup.exe

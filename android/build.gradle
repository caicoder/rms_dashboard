allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
    project.evaluationDependsOn(":app")
}

subprojects {
    // Workaround for plugins like package_info_plus 9+ that expect flutter.compileSdkVersion
    if (project.name != 'app') {
        project.ext.flutter = [
            compileSdkVersion: 34,
            minSdkVersion: 21,
            targetSdkVersion: 34
        ]
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  mqtt_client: ^10.5.1
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  intl: ^0.19.0
